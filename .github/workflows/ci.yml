name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      # Parse every PowerShell source file first. PSScriptAnalyzer is run at
      # Error,Warning severity below, but parse errors surface as ParseError
      # severity and are NOT caught by that filter — so a syntactically broken
      # module can pass lint and only blow up when Pester dot-sources it. This
      # step (no module install required) fails fast and points at the exact
      # file/line. See the #56 regression that motivated it.
      - name: Parse-check PowerShell sources
        shell: pwsh
        run: |
          $bad = $false
          Get-ChildItem -Path . -Recurse -Include *.ps1, *.psm1, *.psd1 |
            Where-Object { $_.FullName -notmatch '\\\.git\\' } |
            ForEach-Object {
              $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                $_.FullName, [ref]$null, [ref]$errors) | Out-Null
              if ($errors) {
                $bad = $true
                Write-Host "::error file=$($_.FullName)::$($errors.Count) parse error(s)"
                $errors | ForEach-Object {
                  Write-Host "  $($_.Extent.StartLineNumber):$($_.Extent.StartColumnNumber) $($_.Message)"
                }
              }
            }
          if ($bad) { throw 'Parse errors found in PowerShell sources.' }
          Write-Host 'All PowerShell sources parsed cleanly.'

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity ParseError, Error, Warning
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) issue(s)."
          }
          Write-Host "No issues found."

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest -Path MSIX.psd1

  test:
    name: Pester Tests
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -SkipPublisherCheck -MinimumVersion 5.0

      - name: Run Pester tests
        shell: pwsh
        run: |
          $testPath = if (Test-Path ./MSIX.Tests -PathType Container) { './MSIX.Tests' }
                      elseif (Test-Path ./tests -PathType Container) { './tests' }
                      else { $null }
          if ($testPath) {
            $cfg = New-PesterConfiguration
            $cfg.Run.Path = $testPath
            $cfg.Run.Exit = $true
            Invoke-Pester -Configuration $cfg
          } else {
            throw "No test directory found (expected MSIX.Tests/ or tests/)."
          }

  integration:
    name: Integration Tests (real MSIX)
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -SkipPublisherCheck -MinimumVersion 5.0

      # Build the SDK toolchain (MakeAppx / signtool) via the module's own
      # installer so the Integration-tagged tests can pack and sign real .msix
      # fixtures instead of skipping. If acquisition fails (e.g. NuGet/PSGallery
      # outage) the tests skip loudly rather than failing the build.
      - name: Provision SDK toolchain
        shell: pwsh
        run: |
          Import-Module ./MSIX.psd1 -Force
          try { Install-MsixSdkTool | Out-Null }
          catch { Write-Host "::warning::SDK toolchain provisioning failed: $($_.Exception.Message)" }

      - name: Run integration tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path        = './MSIX.Tests'
          $cfg.Run.Exit        = $true
          $cfg.Filter.Tag      = 'Integration'
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg
