name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error, Warning
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) issue(s)."
          }
          Write-Host "No issues found."

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest -Path MSIX.psd1

  test:
    name: Pester Tests
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -SkipPublisherCheck -MinimumVersion 5.0

      - name: Run Pester tests
        shell: pwsh
        run: |
          $testPath = if (Test-Path ./MSIX.Tests -PathType Container) { './MSIX.Tests' }
                      elseif (Test-Path ./tests -PathType Container) { './tests' }
                      else { $null }
          if ($testPath) {
            $cfg = New-PesterConfiguration
            $cfg.Run.Path = $testPath
            $cfg.Run.Exit = $true
            Invoke-Pester -Configuration $cfg
          } else {
            throw "No test directory found (expected MSIX.Tests/ or tests/)."
          }
